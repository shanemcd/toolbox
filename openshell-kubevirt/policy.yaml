version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    # Keep defaults from the gateway-built initial policy (cannot shrink live).
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    # Hermes / NemoClaw on the bootc guest
    - /opt/hermes
    - /opt/nemoclaw-blueprint
    - /usr/local
    - /lib64
    - /bin
    - /sbin
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /opt/data
    - /dev/pts
    - /run

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # OpenShell inference proxy (Vertex). Hermes dials this host; gateway rewrites.
  inference:
    name: inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  # Auxiliary model / credit probe fallback
  openrouter:
    name: openrouter
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  duckduckgo:
    name: duckduckgo
    endpoints:
      - host: duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.duckduckgo.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python

  github:
    name: github
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: codeload.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      # Release / raw / package CDNs (gh + other GitHub release installs)
      - host: "*.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      # Downloaders (Landlock: install into /sandbox/... — /usr/local is read-only)
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      # Post-install binary locations
      - path: /sandbox/.hermes/bin/gh
      - path: /sandbox/**/bin/gh
      - path: /usr/local/bin/gh
      - path: /usr/bin/gh
      - path: /usr/local/bin/git-credential-openshell

  gitlab_redhat:
    name: gitlab-redhat
    endpoints:
      - host: gitlab.cee.redhat.com
        port: 22
        enforcement: enforce
        access: full
      - host: gitlab.cee.redhat.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/python3.13
      - path: /usr/bin/git
      - path: /usr/bin/ssh
      - path: /usr/bin/curl
      - path: /usr/local/bin/glab
      - path: /usr/local/bin/git-credential-openshell

  # uv installer
  astral:
    name: astral
    endpoints:
      - host: astral.sh
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.astral.sh"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/wget
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/pip
      - path: /usr/bin/pip3

  # tirith / package ecosystem metadata
  package_metadata:
    name: package-metadata
    endpoints:
      - host: api.deps.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: packages.ecosyste.ms
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /sandbox/.hermes/bin/tirith
      - path: /sandbox/**/bin/tirith
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  slack:
    name: slack
    endpoints:
      - host: "*.slack.com"
        port: 443
        protocol: websocket
        enforcement: enforce
        access: full
        websocket_credential_rewrite: true
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13

  signal:
    name: signal
    endpoints:
      - host: signal-cli.default.svc.cluster.local
        port: 8080
        protocol: rest
        enforcement: enforce
        access: full
        # ClusterIP is RFC1918; without allowed_ips the proxy L7-allows then
        # SSRF-denies ("resolves to internal address"). CRC serviceNetwork.
        allowed_ips:
          - 10.217.4.0/23
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl

  # Google Workspace CLI (token refresh POST body rewritten by --provider gws)
  google_workspace:
    name: google-workspace
    endpoints:
      - host: gmail.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: calendar-json.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: www.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        request_body_credential_rewrite: true
      - host: accounts.google.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/python3.13
      - path: /usr/local/lib/node_modules/@googleworkspace/cli/bin/gws
      - path: /usr/lib/node_modules/@googleworkspace/cli/bin/gws
      - path: /usr/local/bin/gws
      - path: /usr/bin/gws
      - path: /usr/bin/curl

  # jirahhh / Atlassian REST (Basic auth rewritten by --provider atlassian)
  atlassian_jira:
    name: atlassian-jira
    endpoints:
      - host: "*.atlassian.net"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /opt/hermes/.venv/bin/jirahhh
      - path: /sandbox/**/bin/jirahhh

  atlassian_mcp:
    name: atlassian-mcp
    endpoints:
      - host: mcp.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: id.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /opt/hermes/.venv/bin/python
      - path: /usr/bin/python3.13
      - path: /usr/bin/curl
