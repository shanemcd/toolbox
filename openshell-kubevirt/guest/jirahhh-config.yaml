# Site jirahhh config for the Hermes guest.
# Email/token are OpenShell placeholders — resolved at egress via --provider atlassian.
# Do not put real credentials here.
prod:
  url: https://redhat.atlassian.net
  email: openshell:resolve:env:JIRA_EMAIL
  token: openshell:resolve:env:JIRA_API_TOKEN
  custom_fields:
    acceptance_criteria: customfield_10718
    epic_name: customfield_10011
    parent_link: customfield_10018
    epic_link: customfield_10014
  security_levels:
    default: "10049"

custom_fields:
  acceptance_criteria: customfield_10718
  epic_name: customfield_10011
  parent_link: customfield_10018
  epic_link: customfield_10014

security_levels:
  default: "10049"
