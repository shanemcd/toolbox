name: Build Container Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry to push to'
        required: false
        type: choice
        options:
          - quay.io
          - ghcr.io
  schedule:
    # Run nightly at 2:00 AM Eastern (7:00 AM UTC)
    - cron: '0 7 * * *'

permissions:
  packages: write

jobs:
  build-images:
    name: Build ${{ matrix.desktop }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        desktop: [kinoite, silverblue]
        arch: [x86_64, aarch64]
      fail-fast: false
    env:
      REGISTRY: ${{ inputs.registry || 'quay.io' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # Remove unnecessary packages to free up space
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Login to GHCR
        if: env.REGISTRY == 'ghcr.io'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Quay.io
        if: env.REGISTRY == 'quay.io'
        run: |
          echo "${{ secrets.QUAY_AUTH }}" | base64 -d | awk -F: '{print $2}' | docker login quay.io -u $(echo "${{ secrets.QUAY_AUTH }}" | base64 -d | awk -F: '{print $1}') --password-stdin

      - name: Build image
        run: make build-mybox DESKTOP=${{ matrix.desktop }} CONTAINER_RUNTIME=docker MYBOX_IMAGE=${{ env.REGISTRY }}/shanemcd/mybox

      - name: Show image info
        run: |
          docker images | grep mybox

      - name: Push image
        run: make push-mybox DESKTOP=${{ matrix.desktop }} CONTAINER_RUNTIME=docker MYBOX_IMAGE=${{ env.REGISTRY }}/shanemcd/mybox

      - name: Save image size info
        run: |
          echo "## Build Summary - ${{ matrix.desktop }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | grep mybox >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
