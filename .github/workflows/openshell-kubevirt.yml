# Site Hermes image builds moved to shanemcd/openshell-kubevirt
# (.github/workflows/nightly-rebuild.yml → build-hermes-site).
# Guest sources stay in this repo under openshell-kubevirt/.
name: Downstream Hermes images

on:
  workflow_dispatch:

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Builds moved to openshell-kubevirt
        run: |
          set -euo pipefail
          cat <<'EOF'
          Site Hermes CI lives in shanemcd/openshell-kubevirt now.

            https://github.com/shanemcd/openshell-kubevirt/actions/workflows/nightly-rebuild.yml

          Dispatch with build_site_hermes=true (default). Sources remain here:
            toolbox/openshell-kubevirt/
          EOF
          exit 1
